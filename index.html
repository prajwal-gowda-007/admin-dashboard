<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="admin-dashboard.css">
</head>
<body>
    <div class="main-layout">

        <div class="sidebar-layout">

            <div class="dashboard-logo-line">
                <img src="./svg-icon/dashboard-icon.svg" alt="Dashboard icon">
                <h1 style="color: white;">Dashboard</h1>
            </div>

            <ul class="dashboard-list">
                <li> <img src="./svg-icon/home.svg" alt="home icon"><a href="">Home</a></li>
                <li> <img src="./svg-icon/profile.svg" alt="profile icon"> <a href="">Profile</a> </li>
                <li> <img src="./svg-icon/messages.svg" alt="messages icon"> <a href="">Messages</a> </li>
                <li> <img src="./svg-icon/history.svg" alt="history icon"> <a href="">History</a> </li>
                <li> <img src="./svg-icon/tasks.svg" alt="task icon"> <a href="">Task</a> </li>
                <li> <img src="./svg-icon/communities.svg" alt="communities icon"> <a href="">Communities</a> </li>
                <li> <img src="./svg-icon/settings.svg" alt=" settings icon"> <a href="">Settings</a> </li>
                <li> <img src="./svg-icon/support.svg" alt="support icon"> <a href="">Support</a> </li>
                <li> <img src="./svg-icon/privacy.svg" alt=" privacy icon"> <a href="">Privacy</a> </li>
            </ul>
        
        </div>

        <div class="header-layout">
            <div class="search-bar-layout">
                <div class="search-bar">
                    <img src="./svg-icon/search.svg" alt="search icon" class="search-bar-imgs">
                    <input type="text">
                </div>

                <div class="notification-layout">
                    <img src="./svg-icon/notification.svg" alt="notification icon" class="search-bar-imgs">
                    <img src="./svg-icon/profile-img.jpg" alt="profile image" class="profile-img">
                    <p style="font-weight: 700; font-size: larger;">Morgan Oakley</p>
                </div>
            </div>

            <div class="profile-panel">
                <div class="profile-left-panel">
                    <img src="./svg-icon/profile-img.jpg" alt="profile icon" class="profile-img">
                    <div class="profile-info">
                    <p>Hi there,</p>
                    <p style="font-weight: 700; font-size: 1.5rem;">Morgan Oakley (@morgan)</p>
                    </div>
                </div>
                <div class="profile-right-panel">
                    <button>New</button>
                    <button>Upload</button>
                    <button>Share</button>
                </div>
            </div>

        </div>

        <div class="content-layout"></div>

    </div>
</body>
</html>
